---
# =============================================================================
# playbooks/site.yml
# Master Playbook สำหรับจัดการระบบสำรองข้อมูลทั้งหมด
# =============================================================================
# ไฟล์นี้ทำการรวบรวม Playbooks หลักมารันรวมกันในไฟล์เดียว
# สะดวกสำหรับการ Setup และทดสอบครั้งแรก
#
# วิธีการใช้งาน:
#   ansible-playbook -i inventory/hosts.yml playbooks/site.yml --ask-vault-pass
# =============================================================================

# 1. รัน Playbook สำหรับติดตั้งโปรแกรมและเตรียมการระบบ
- ansible.builtin.import_playbook: setup.yml

# 2. รัน Playbook สำหรับทดสอบการ Backup (สามารถสั่งรันแยกได้ตามสะดวก)
- ansible.builtin.import_playbook: backup.yml
