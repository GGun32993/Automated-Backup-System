# =============================================================================
# Ansible Configuration - ไฟล์ตั้งค่าหลักของ Ansible
# =============================================================================
# ไฟล์นี้เป็นการตั้งค่า Ansible สำหรับระบบ Automated Backup System
# Ansible จะอ่านไฟล์นี้จาก directory ปัจจุบันก่อนเสมอ
# ลำดับการอ่าน config: ANSIBLE_CONFIG (env) > ansible.cfg (current dir) > ~/.ansible.cfg > /etc/ansible/ansible.cfg
# =============================================================================

[defaults]
# --------------------------------------------------------------------------
# ส่วนตั้งค่าทั่วไป (General Settings)
# --------------------------------------------------------------------------

# inventory - กำหนดตำแหน่งไฟล์ inventory ที่เก็บรายชื่อ hosts
inventory = inventory/hosts.yml

# roles_path - กำหนดตำแหน่งโฟลเดอร์เก็บ Roles
# บอกให้ Ansible ค้นหา roles ที่ตำแหน่ง root ของโปรเจกต์
roles_path = roles

# vault_password_file - ปิดไว้สำหรับการทดสอบแบบใส่รหัสเองผ่าน --ask-vault-pass
# vault_password_file = ~/.vault_pass

# remote_user - ผู้ใช้ที่จะ SSH ไปยังเครื่องเป้าหมาย
remote_user = backup

# host_key_checking - ตรวจสอบ SSH host key หรือไม่
host_key_checking = False

# log_path - เปลี่ยนมาเซฟ log ในโฟลเดอร์โปรเจกต์ เพื่อไม่ให้ติดสิทธิ์ (Permission denied) ของระบบ
log_path = ansible.log

# forks - จำนวน host ที่ Ansible จะทำงานพร้อมกัน (parallel execution)
# ค่า 5 เหมาะสำหรับ Home Lab ที่มีเครื่องไม่มาก
# ถ้ามีเครื่องเยอะ สามารถเพิ่มได้ แต่ต้องระวังเรื่อง resource ของ Control Node
# Control Node มี RAM แค่ 512MB-1GB จึงไม่ควรตั้งค่าสูงเกิน
forks = 5

# timeout - เวลารอการเชื่อมต่อ SSH (วินาที)
# 30 วินาทีเพียงพอสำหรับ LAN ถ้าเครื่องอยู่ต่าง network อาจต้องเพิ่ม
timeout = 30

# retry_files_enabled - สร้างไฟล์ .retry เมื่อ playbook ล้มเหลวหรือไม่
# ปิดไว้เพราะไฟล์ .retry รกโปรเจกต์ และเราใช้ log file แทน
retry_files_enabled = False

# stdout_callback - รูปแบบการแสดงผล output
# yaml - แสดงผลเป็น YAML format (ปิดไว้เพื่อป้องกันปัญหาของปลั๊กอินในรุ่นใหม่)
# stdout_callback = yaml

# --------------------------------------------------------------------------
# ส่วนตั้งค่าเพิ่มเติมที่แนะนำ (Additional Recommended Settings)
# --------------------------------------------------------------------------

# interpreter_python - กำหนด Python interpreter ที่จะใช้บนเครื่องเป้าหมาย
# auto_silent ให้ Ansible หา Python เองโดยไม่แสดง warning
interpreter_python = auto_silent

# callbacks_enabled - เปิดใช้ callback plugins เพิ่มเติม
# timer - แสดงเวลาที่ใช้ในการรัน playbook
# profile_tasks - แสดงเวลาที่ใช้ในแต่ละ task (มีประโยชน์สำหรับ optimization)
callbacks_enabled = timer, profile_tasks

[privilege_escalation]
# --------------------------------------------------------------------------
# ส่วนตั้งค่าการยกระดับสิทธิ์ (Privilege Escalation / sudo)
# --------------------------------------------------------------------------

# become - เปิดใช้ sudo เป็นค่า default สำหรับทุก task
# การติดตั้ง package และจัดการ service ต้องใช้สิทธิ์ root
become = True

# become_method - วิธีการยกระดับสิทธิ์ (sudo คือค่ามาตรฐานของ Linux)
become_method = sudo

# become_user - ยกระดับสิทธิ์เป็น user ไหน
become_user = root

# become_ask_pass - ถาม sudo password หรือไม่
# ปิดไว้เพราะเราตั้งค่า NOPASSWD ใน sudoers สำหรับ backup user
# ดูรายละเอียดใน roles/common/tasks/user.yml
become_ask_pass = False

[ssh_connection]
# --------------------------------------------------------------------------
# ส่วนตั้งค่า SSH Connection (การเชื่อมต่อ SSH)
# --------------------------------------------------------------------------

# pipelining - เปิดใช้ SSH pipelining เพื่อเพิ่มความเร็ว
# ลดจำนวน SSH connection โดยส่งคำสั่งหลายๆ อันผ่าน connection เดียว
# ⚠️ ต้องปิด requiretty ใน sudoers ของเครื่องเป้าหมายด้วย
pipelining = True

# ssh_args - arguments เพิ่มเติมสำหรับ SSH
# ControlMaster=auto - ใช้ SSH connection ซ้ำ (connection multiplexing)
# ControlPersist=60s - เก็บ connection ไว้ 60 วินาทีหลังใช้งานครั้งสุดท้าย
# ช่วยให้ task ต่อๆ ไปไม่ต้องสร้าง SSH connection ใหม่
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15
